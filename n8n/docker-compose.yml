services:
  n8n:
    build: .
    container_name: comicgen-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Zurich}
      - TZ=${GENERIC_TIMEZONE:-Europe/Zurich}
      # Keep run binaries (PNGs / wav / mp4) on disk instead of in memory.
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      # n8n 2.x excludes the Execute Command node by default; we need it for
      # ffmpeg rendering and the TikTok token helper.
      - NODES_EXCLUDE=[]
      # n8n 2.x also blocks $env.* in expressions by default; the workflow reads
      # the API keys below that way.
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # n8n 2.x restricts the Read/Write File node to ~/.n8n-files by default;
      # the workflow reads/writes run artifacts under the mounted /project.
      - N8N_RESTRICT_FILE_ACCESS_TO=/project
      # API keys read by the native workflow via {{ $env.… }} expressions.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FAL_API_KEY=${FAL_API_KEY}
      - TIKTOK_CLIENT_KEY=${TIKTOK_CLIENT_KEY}
      - TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET}
    volumes:
      # The repo (read-write: output/, tiktok_token.json get written).
      - ..:/project
      # n8n's own state (workflows, executions, credentials).
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
